<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministry Blog</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #1e1b4b, #6d28d9);
  color: white;
}

nav {
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(0,0,0,0.4);
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 38px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  max-width: 1100px;
  margin: auto;
  gap: 20px;
  padding: 20px;
}

.posts {
  flex: 2;
}

.sidebar {
  flex: 1;
}

.post {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
}

.post.newest {
  border: 2px solid #c084fc;
}

.post h3 {
  margin-top: 0;
}

.date {
  font-size: 12px;
  opacity: 0.7;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.profile img {
  width: 130px;
  border-radius: 100%;
}

.button {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: #9333ea;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
}

@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }
}
</style>

</head>

<body>

<nav>
  <h1>Ministry</h1>
</nav>

<div class="hero">
  <h2>Scripture • Devotion • Worship</h2>
  <p>Lifting the name of Jesus</p>
</div>

<div class="container">

  <!-- AUTO POSTS LOAD HERE -->
  <div class="posts" id="posts"></div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="card profile">
      <h3>About Me</h3>
      <p>Sharing Scripture, devotion, and worship centered on Jesus.</p>
      <img src="0f37fee160b59ac8c6d0058bb3746ac1.jpeg">
      <br>
      <a class="button" href="https://www.pentecostalsofwindsor.faith/" target="_blank">
        Visit My Church
      </a>
    </div>

    <div class="card">
      <h3>Scripture of the Day</h3>
      <p><strong>Acts 2:38</strong></p>
    </div>

    <div class="card">
      <h3>Worship</h3>
      <iframe src="https://www.youtube.com/embed/VIDEOID"></iframe>
    </div>

  </div>

</div>

<!-- LOAD POSTS SCRIPT -->
<script>
async function loadPosts() {
  const container = document.getElementById("posts");

  try {
    const res = await fetch("https://api.github.com/repos/brad-hobbswd/anthony-blog-devotion/contents/_posts");
    const files = await res.json();

    const posts = [];

    for (const file of files) {
      if (file.name.endsWith(".md")) {
        const raw = await fetch(file.download_url);
        const text = await raw.text();

        const title = (text.match(/title:\s*"(.+)"/) || [])[1] || "No Title";
        const date = (text.match(/date:\s*(.+)/) || [])[1] || "";
        const content = text.split("---")[2] || "";

        posts.push({ title, date, content });
      }
    }

    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    posts.forEach((post, index) => {
      const div = document.createElement("div");
      div.className = "post" + (index === 0 ? " newest" : "");

      div.innerHTML = `
        <h3>${post.title}</h3>
        <p class="date">${post.date}</p>
        <p>${post.content}</p>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "<p>Posts could not load.</p>";
  }
}

loadPosts();
</script>

<!-- NETLIFY IDENTITY -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
if (window.netlifyIdentity) {
  window.netlifyIdentity.on("login", () => {
    document.location.href = "/admin/";
  });
}
</script>

</body>
