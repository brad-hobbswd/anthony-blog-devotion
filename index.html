<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministry Blog</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&family=Lora:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(to bottom, #1e1b4b, #6d28d9);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 15px;
  background: rgba(0,0,0,0.4);
}

/* LOGO */
.logo-icon {
  width: 30px;
}

.logo {
  font-family: 'Playfair Display', serif;
}

.name {
  font-size: 30px;
  color: #c084fc;
  text-shadow: 0 0 10px rgba(192,132,252,0.6);
}

.rest {
  font-size: 18px;
  opacity: 0.85;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(to right, rgba(30,27,75,0.9), rgba(109,40,217,0.9));
}

.hero h2 {
  font-size: 42px;
}

/* LAYOUT */
.container {
  display: flex;
  flex-wrap: wrap;
  max-width: 1100px;
  margin: auto;
  gap: 20px;
  padding: 20px;
}

.posts { flex: 2; }
.sidebar { flex: 1; }

/* CARDS */
.post, .card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 25px;
  transition: 0.3s;
}

.post:hover, .card:hover {
  transform: translateY(-5px);
}

.post.newest {
  border: 2px solid #c084fc;
}

/* TEXT */
.post h3 {
  font-size: 22px;
}

.post p {
  font-family: 'Lora', Georgia, serif;
  font-size: 16px;
  line-height: 1.9;
}

/* PRAYER */
.prayer-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-top: 20px;
  color: #c084fc;
}

.prayer-box {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-left: 3px solid #c084fc;
  border-radius: 8px;
  margin-top: 10px;
}

/* BUTTON */
.button {
  padding: 10px 18px;
  background: linear-gradient(to right, #9333ea, #7c3aed);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MEDIA */
iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 25px;
  font-size: 12px;
  opacity: 0.7;
}
</style>

</head>

<body>

<nav>
  <img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" class="logo-icon">
  <h1 class="logo">
    <span class="name">Anthony’s</span>
    <span class="rest">Home Page in Devotion & Ministry</span>
  </h1>
</nav>

<div class="hero">
  <h2>Scripture • Devotion • Worship</h2>
</div>

<div class="container">

<div class="posts">
  <h2>Latest Devotions</h2>
  <div id="posts"></div>
</div>

<div class="sidebar">

  <div class="card">
    <h3>Worship</h3>
    <iframe src="https://www.youtube.com/embed/REzub8autiY"></iframe>
  </div>

</div>

</div>

<script>
async function loadPosts() {
  const container = document.getElementById("posts");

  const res = await fetch("https://api.github.com/repos/brad-hobbswd/anthony-blog-devotion/contents/_posts");
  const files = await res.json();

  for (const file of files) {
    if (!file.name.endsWith(".md")) continue;

    const raw = await fetch(file.download_url);
    const text = await raw.text();

    const parts = text.split("---");
    const front = parts[1];
    const body = parts[2];

    const title = (front.match(/title:\s*(.+)/) || [])[1] || "No Title";

    const paragraphs = body.trim().split(/\n\s*\n/);

    const formatted = paragraphs.map(p => {
      if (p.trim().toLowerCase() === "prayer") {
        return `<div class="prayer-title">Prayer</div>`;
      }
      if (p.toLowerCase().startsWith("lord")) {
        return `<div class="prayer-box"><p>${p}</p></div>`;
      }
      return `<p>${p}</p>`;
    }).join("");

    const preview = paragraphs.slice(0,2).map(p => `<p>${p}</p>`).join("");

    const div = document.createElement("div");
    div.className = "post";

    const id = "post-" + Math.random();

    div.innerHTML = `
      <h3>${title}</h3>
      <div id="${id}">${preview}</div>
      <button class="button" onclick="toggle('${id}', this)">Read More</button>
    `;

    div.dataset.full = formatted;
    div.dataset.preview = preview;

    container.appendChild(div);
  }
}

function toggle(id, btn){
  const el = document.getElementById(id);
  const parent = btn.parentElement;

  if(btn.innerText === "Read More"){
    el.innerHTML = parent.dataset.full;
    btn.innerText = "Show Less";
  } else {
    el.innerHTML = parent.dataset.preview;
    btn.innerText = "Read More";
  }
}

loadPosts();
</script>

<footer>
© 2026 Brad Hobbs Web Design
</footer>

</body>
</html>
